<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autószerviz Vadász – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:#0d0d0d; --dark:#1a1a1a; --dark-mid:#252525; --steel:#2e2e2e;
      --orange:#ff6b00; --orange-dk:#cc5500; --silver:#c0c0c0; --silver-lt:#e8e8e8;
      --text:#f0f0f0; --text-muted:#888; --white:#ffffff;
      --danger:#c0392b; --radius:12px; --shadow:0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--black);
    }
    .login-box {
      background: var(--dark-mid); border-radius: 20px; padding: 40px 32px;
      width: 340px; box-shadow: var(--shadow); text-align: center;
      border: 1px solid var(--steel);
    }
    .login-icon { font-size: 48px; margin-bottom: 12px; }
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
      color: var(--orange); margin-bottom: 6px;
    }
    .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .login-input {
      width: 100%; padding: 12px; border: 1.5px solid var(--steel);
      border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px;
      background: var(--black); color: var(--text); margin-bottom: 14px; outline: none;
    }
    .login-input:focus { border-color: var(--orange); }
    .login-btn {
      width: 100%; padding: 12px; background: var(--orange); color: var(--white);
      border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 2px; cursor: pointer;
    }
    .login-btn:active { background: var(--orange-dk); }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; }

    /* ADMIN LAYOUT */
    #admin-screen { display: none; }
    header {
      background: var(--black); padding: 0 24px;
      height: 58px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 2px solid var(--orange);
    }
    .header-logo { font-size: 26px; }
    .header-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 20px;
      letter-spacing: 2px; color: var(--orange); flex: 1;
    }
    .header-badge {
      background: var(--orange); color: var(--white);
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 1px;
    }

    /* TABS */
    .admin-tabs {
      background: var(--dark-mid); display: flex; overflow-x: auto;
      border-bottom: 1px solid var(--steel); scrollbar-width: none;
    }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .admin-tab {
      padding: 12px 20px; white-space: nowrap;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border: none;
      background: none; border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .admin-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* STATS */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; padding: 20px 24px;
    }
    .stat-card {
      background: var(--dark-mid); border-radius: var(--radius);
      padding: 16px; text-align: center;
      border: 1px solid var(--steel);
    }
    .stat-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 1px; color: var(--orange);
    }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* PANEL */
    .panel { display: none; padding: 0 24px 24px; }
    .panel.active { display: block; }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 1px; color: var(--orange);
      margin: 20px 0 12px; display: flex; align-items: center; gap: 8px;
    }

    /* CARDS */
    .item-card {
      background: var(--dark-mid); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px;
      border: 1px solid var(--steel);
      border-left: 4px solid transparent;
    }
    .item-card.pending { border-left-color: var(--orange); }
    .item-card.approved { border-left-color: #22c55e; }
    .item-card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px; letter-spacing: 1px; color: var(--silver-lt);
      margin-bottom: 4px;
    }
    .item-card-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .item-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .item-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--steel); color: var(--silver);
    }
    .item-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 8px 16px; border-radius: 8px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
    .btn-approve { background: #22c55e; color: var(--white); }
    .btn-delete { background: var(--danger); color: var(--white); }
    .btn-edit { background: var(--steel); color: var(--silver-lt); }
    .btn-primary { background: var(--orange); color: var(--white); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--dark-mid); border-radius: 16px;
      padding: 24px; width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
      border: 1px solid var(--steel);
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 1px; color: var(--orange);
      margin-bottom: 16px;
    }
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--steel);
      border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; background: var(--black); color: var(--text); outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--orange); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; }
    .form-checkbox-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; cursor: pointer;
      background: var(--steel); padding: 6px 12px; border-radius: 20px;
      color: var(--text);
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-cancel { background: var(--steel); color: var(--text); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--orange); color: var(--white);
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: all 0.3s; z-index: 300;
      white-space: nowrap; box-shadow: var(--shadow);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading { padding: 40px; text-align: center; color: var(--text-muted); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🔧</div>
    <div class="login-title">Autószerviz Vadász</div>
    <div class="login-sub">Admin felület</div>
    <input type="password" class="login-input" id="pw-input" placeholder="Jelszó" />
    <button class="login-btn" id="login-btn">Belépés</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-logo">🔧</div>
    <div class="header-title">Autószerviz Vadász Admin</div>
    <div class="header-badge">ADMIN</div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="stat-approved">–</div>
      <div class="stat-label">Jóváhagyott szerviz</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-pending">–</div>
      <div class="stat-label">Függőben lévő</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-events">–</div>
      <div class="stat-label">Aktív akció</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-evt-pending">–</div>
      <div class="stat-label">Akció függőben</div>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" data-panel="locations">🔧 Szervizek</button>
    <button class="admin-tab" data-panel="pending">📥 Beküldések</button>
    <button class="admin-tab" data-panel="events">📅 Akciók</button>
    <button class="admin-tab" data-panel="evt-pending">📥 Akció beküldések</button>
  </div>

  <!-- APPROVED -->
  <div class="panel active" id="panel-locations">
    <div class="section-title">
      ✅ Jóváhagyott szervizek
      <button class="btn btn-primary" onclick="openAddModal()" style="margin-left:auto;font-size:12px;padding:6px 14px">+ Új szerviz</button>
    </div>
    <div id="locations-list"><div class="loading">Betöltés…</div></div>
  </div>

  <!-- PENDING -->
  <div class="panel" id="panel-pending">
    <div class="section-title">📥 Beküldött szervizek</div>
    <div id="pending-list"><div class="loading">Betöltés…</div></div>
  </div>

  <!-- EVENTS -->
  <div class="panel" id="panel-events">
    <div class="section-title">
      📅 Aktív akciók
      <button class="btn btn-primary" onclick="openAddEventModal()" style="margin-left:auto;font-size:12px;padding:6px 14px">+ Új akció</button>
    </div>
    <div id="events-list"><div class="loading">Betöltés…</div></div>
  </div>

  <!-- PENDING EVENTS -->
  <div class="panel" id="panel-evt-pending">
    <div class="section-title">📥 Beküldött akciók</div>
    <div id="evt-pending-list"><div class="loading">Betöltés…</div></div>
  </div>
</div>

<!-- LOCATION MODAL -->
<div class="modal-overlay" id="location-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Új szerviz</div>
    <input type="hidden" id="edit-doc-id" />
    <div class="form-group">
      <label class="form-label">Szerviz neve *</label>
      <input type="text" class="form-input" id="m-name" placeholder="pl. Kovács Autószerviz" />
    </div>
    <div class="form-group">
      <label class="form-label">Cím</label>
      <input type="text" class="form-input" id="m-address" />
    </div>
    <div class="form-group">
      <label class="form-label">Lat</label>
      <input type="number" step="0.000001" class="form-input" id="m-lat" />
    </div>
    <div class="form-group">
      <label class="form-label">Lng</label>
      <input type="number" step="0.000001" class="form-input" id="m-lng" />
    </div>
    <div class="form-group">
      <label class="form-label">Ország (pl. HU)</label>
      <input type="text" class="form-input" id="m-country" maxlength="2" placeholder="HU" />
    </div>
    <div class="form-group">
      <label class="form-label">Telefon</label>
      <input type="tel" class="form-input" id="m-phone" />
    </div>
    <div class="form-group">
      <label class="form-label">Weboldal</label>
      <input type="url" class="form-input" id="m-web" />
    </div>
    <div class="form-group">
      <label class="form-label">Típus</label>
      <div class="form-checkboxes">
        <label class="form-checkbox-label"><input type="checkbox" id="m-tyre"> 🛞 Gumi</label>
        <label class="form-checkbox-label"><input type="checkbox" id="m-body"> 🚗 Karosszéria</label>
        <label class="form-checkbox-label"><input type="checkbox" id="m-electric_car"> ⚡ Elektromos</label>
        <label class="form-checkbox-label"><input type="checkbox" id="m-open247"> 🕐 24h</label>
        <label class="form-checkbox-label"><input type="checkbox" id="m-oil"> 🛢️ Olajcsere</label>
        <label class="form-checkbox-label"><input type="checkbox" id="m-ac"> ❄️ Klíma</label>
        <label class="form-checkbox-label"><input type="checkbox" id="m-verified"> ✅ Megerősített</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Megjegyzés</label>
      <textarea class="form-textarea" id="m-note"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="modal-save-btn">💾 Mentés</button>
      <button class="btn btn-cancel" onclick="closeLocationModal()">Mégse</button>
    </div>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="event-modal">
  <div class="modal-box">
    <div class="modal-title" id="event-modal-title">Új akció</div>
    <input type="hidden" id="edit-event-id" />
    <div class="form-group">
      <label class="form-label">Cím *</label>
      <input type="text" class="form-input" id="em-name" />
    </div>
    <div class="form-group">
      <label class="form-label">Szerviz neve</label>
      <input type="text" class="form-input" id="em-location" />
    </div>
    <div class="form-group">
      <label class="form-label">Dátum *</label>
      <input type="date" class="form-input" id="em-date" />
    </div>
    <div class="form-group">
      <label class="form-label">Leírás</label>
      <textarea class="form-textarea" id="em-desc"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Link</label>
      <input type="url" class="form-input" id="em-web" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="event-save-btn">💾 Mentés</button>
      <button class="btn btn-cancel" onclick="closeEventModal()">Mégse</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const PROJECT_ID = 'auto-szerviz-vadasz';
  const API_KEY = 'AIzaSyDC-cYPsnliB7FZ6fkqxmOSQxc_fP1Rm2M';
  const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`;
  const ADMIN_PW = 'zola19';

  // LOGIN
  document.getElementById('login-btn').onclick = function() {
    if (document.getElementById('pw-input').value === ADMIN_PW) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadAll();
    } else {
      document.getElementById('login-error').textContent = 'Hibás jelszó!';
    }
  };
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  // REST API
  async function fsList(col) {
    const r = await fetch(`${BASE}/${col}?key=${API_KEY}&pageSize=200`);
    return r.json();
  }
  async function fsSet(col, docId, fields) {
    const body = { fields: toFs(fields) };
    const method = docId ? 'PATCH' : 'POST';
    const url = docId ? `${BASE}/${col}/${docId}?key=${API_KEY}` : `${BASE}/${col}?key=${API_KEY}`;
    const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  }
  async function fsDelete(col, docId) {
    await fetch(`${BASE}/${col}/${docId}?key=${API_KEY}`, { method: 'DELETE' });
  }

  function toFs(obj) {
    const fields = {};
    for (const [k, v] of Object.entries(obj)) {
      if (v === null || v === undefined) continue;
      if (typeof v === 'boolean') fields[k] = { booleanValue: v };
      else if (typeof v === 'number') fields[k] = { doubleValue: v };
      else fields[k] = { stringValue: String(v) };
    }
    return fields;
  }

  function fromFs(doc) {
    if (!doc.fields) return {};
    const obj = { _id: doc.name?.split('/').pop() };
    for (const [k, v] of Object.entries(doc.fields)) {
      obj[k] = v.stringValue ?? v.booleanValue ?? v.doubleValue ?? v.integerValue ?? '';
    }
    return obj;
  }

  function bool(v) { return v === true || v === 'true'; }

  async function loadAll() {
    await Promise.all([loadLocations(), loadPending(), loadEvents(), loadEvtPending()]);
  }

  // LOCATIONS
  let locationsData = [];
  async function loadLocations() {
    const data = await fsList('szervizek');
    locationsData = (data.documents || []).map(fromFs);
    document.getElementById('stat-approved').textContent = locationsData.length;
    renderLocations();
  }

  function renderLocations() {
    const el = document.getElementById('locations-list');
    if (!locationsData.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔧</div><div>Nincsenek szervizek.</div></div>';
      return;
    }
    el.innerHTML = locationsData.map(loc => `
      <div class="item-card approved">
        <div class="item-card-name">${loc.name || '–'} ${bool(loc.verified) ? '✅' : ''}</div>
        <div class="item-card-meta">📍 ${loc.address || '–'} | ${loc.country || '–'} | ${loc.phone || ''}</div>
        <div class="item-card-tags">
          ${bool(loc.tyre) ? '<span class="item-tag">🛞 Gumi</span>' : ''}
          ${bool(loc.body) ? '<span class="item-tag">🚗 Karosszéria</span>' : ''}
          ${bool(loc.electric_car) ? '<span class="item-tag">⚡ Elektromos</span>' : ''}
          ${bool(loc.open247) ? '<span class="item-tag">🕐 24h</span>' : ''}
          ${bool(loc.oil) ? '<span class="item-tag">🛢️ Olajcsere</span>' : ''}
          ${bool(loc.ac) ? '<span class="item-tag">❄️ Klíma</span>' : ''}
        </div>
        <div class="item-actions">
          <button class="btn btn-edit" onclick="editLocation('${loc._id}')">✏️ Szerkesztés</button>
          <button class="btn btn-delete" onclick="deleteLocation('${loc._id}')">🗑️ Törlés</button>
        </div>
      </div>`).join('');
  }

  window.deleteLocation = async function(id) {
    if (!confirm('Biztosan törlöd?')) return;
    await fsDelete('szervizek', id);
    showToast('🗑️ Törölve'); loadLocations();
  };

  window.editLocation = function(id) {
    const loc = locationsData.find(l => l._id === id);
    if (!loc) return;
    document.getElementById('modal-title').textContent = 'Szerviz szerkesztése';
    document.getElementById('edit-doc-id').value = id;
    document.getElementById('m-name').value = loc.name || '';
    document.getElementById('m-address').value = loc.address || '';
    document.getElementById('m-lat').value = loc.lat || '';
    document.getElementById('m-lng').value = loc.lng || '';
    document.getElementById('m-country').value = loc.country || '';
    document.getElementById('m-phone').value = loc.phone || '';
    document.getElementById('m-web').value = loc.website || '';
    document.getElementById('m-note').value = loc.note || '';
    ['tyre','body','electric_car','open247','oil','ac','verified'].forEach(f => {
      document.getElementById('m-' + f).checked = bool(loc[f]);
    });
    document.getElementById('location-modal').classList.add('open');
  };

  window.openAddModal = function() {
    document.getElementById('modal-title').textContent = 'Új szerviz';
    document.getElementById('edit-doc-id').value = '';
    ['m-name','m-address','m-lat','m-lng','m-country','m-phone','m-web','m-note'].forEach(id => document.getElementById(id).value = '');
    ['tyre','body','electric_car','open247','oil','ac','verified'].forEach(f => document.getElementById('m-' + f).checked = false);
    document.getElementById('location-modal').classList.add('open');
  };

  window.closeLocationModal = function() { document.getElementById('location-modal').classList.remove('open'); };

  document.getElementById('modal-save-btn').onclick = async function() {
    const name = document.getElementById('m-name').value.trim();
    if (!name) { showToast('⚠️ Név kötelező!'); return; }
    const docId = document.getElementById('edit-doc-id').value;
    await fsSet('szervizek', docId || null, {
      name, address: document.getElementById('m-address').value.trim(),
      lat: parseFloat(document.getElementById('m-lat').value) || 0,
      lng: parseFloat(document.getElementById('m-lng').value) || 0,
      country: document.getElementById('m-country').value.trim().toUpperCase(),
      phone: document.getElementById('m-phone').value.trim(),
      website: document.getElementById('m-web').value.trim(),
      note: document.getElementById('m-note').value.trim(),
      tyre: document.getElementById('m-tyre').checked,
      body: document.getElementById('m-body').checked,
      electric_car: document.getElementById('m-electric_car').checked,
      open247: document.getElementById('m-open247').checked,
      oil: document.getElementById('m-oil').checked,
      ac: document.getElementById('m-ac').checked,
      verified: document.getElementById('m-verified').checked,
      source: 'admin'
    });
    showToast('✅ Szerviz mentve!'); closeLocationModal(); loadLocations();
  };

  // PENDING
  let pendingData = [];
  async function loadPending() {
    const data = await fsList('bekuldott_szervizek');
    pendingData = (data.documents || []).map(fromFs).filter(d => !bool(d.approved));
    document.getElementById('stat-pending').textContent = pendingData.length;
    renderPending();
  }

  function renderPending() {
    const el = document.getElementById('pending-list');
    if (!pendingData.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📥</div><div>Nincs függőben.</div></div>';
      return;
    }
    el.innerHTML = pendingData.map(loc => `
      <div class="item-card pending">
        <div class="item-card-name">${loc.name || '–'}</div>
        <div class="item-card-meta">📍 ${loc.address || '–'} | 📞 ${loc.phone || '–'}</div>
        ${loc.note ? `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">💬 ${loc.note}</div>` : ''}
        <div class="item-card-tags">
          ${bool(loc.tyre) ? '<span class="item-tag">🛞 Gumi</span>' : ''}
          ${bool(loc.body) ? '<span class="item-tag">🚗 Karosszéria</span>' : ''}
          ${bool(loc.electric_car) ? '<span class="item-tag">⚡ Elektromos</span>' : ''}
          ${bool(loc.open247) ? '<span class="item-tag">🕐 24h</span>' : ''}
        </div>
        <div class="item-actions">
          <button class="btn btn-approve" onclick="approvePending('${loc._id}')">✅ Jóváhagyás</button>
          <button class="btn btn-delete" onclick="deletePending('${loc._id}')">🗑️ Elutasítás</button>
        </div>
      </div>`).join('');
  }

  window.approvePending = async function(id) {
    const loc = pendingData.find(l => l._id === id);
    if (!loc) return;
    const { _id, approved, createdAt, ...rest } = loc;
    await fsSet('szervizek', null, { ...rest, approved: true, verified: false, source: 'community' });
    await fsDelete('bekuldott_szervizek', id);
    showToast('✅ Jóváhagyva!'); loadPending(); loadLocations();
  };

  window.deletePending = async function(id) {
    if (!confirm('Elutasítod?')) return;
    await fsDelete('bekuldott_szervizek', id);
    showToast('🗑️ Törölve'); loadPending();
  };

  // EVENTS
  let eventsData = [];
  async function loadEvents() {
    const data = await fsList('esemenyek');
    eventsData = (data.documents || []).map(fromFs);
    const now = new Date().toISOString().split('T')[0];
    document.getElementById('stat-events').textContent = eventsData.filter(e => e.date >= now).length;
    renderEvents();
  }

  function renderEvents() {
    const el = document.getElementById('events-list');
    if (!eventsData.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div>Nincsenek akciók.</div></div>';
      return;
    }
    el.innerHTML = eventsData.map(e => `
      <div class="item-card approved">
        <div class="item-card-name">${e.name || '–'}</div>
        <div class="item-card-meta">📅 ${e.date || '–'} | 📍 ${e.location || '–'}</div>
        ${e.description ? `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">${e.description}</div>` : ''}
        <div class="item-actions">
          <button class="btn btn-edit" onclick="editEvent('${e._id}')">✏️ Szerkesztés</button>
          <button class="btn btn-delete" onclick="deleteEvent('${e._id}')">🗑️ Törlés</button>
        </div>
      </div>`).join('');
  }

  window.openAddEventModal = function() {
    document.getElementById('event-modal-title').textContent = 'Új akció';
    document.getElementById('edit-event-id').value = '';
    ['em-name','em-location','em-date','em-desc','em-web'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('event-modal').classList.add('open');
  };

  window.editEvent = function(id) {
    const e = eventsData.find(x => x._id === id);
    if (!e) return;
    document.getElementById('event-modal-title').textContent = 'Akció szerkesztése';
    document.getElementById('edit-event-id').value = id;
    document.getElementById('em-name').value = e.name || '';
    document.getElementById('em-location').value = e.location || '';
    document.getElementById('em-date').value = e.date || '';
    document.getElementById('em-desc').value = e.description || '';
    document.getElementById('em-web').value = e.website || '';
    document.getElementById('event-modal').classList.add('open');
  };

  window.closeEventModal = function() { document.getElementById('event-modal').classList.remove('open'); };

  document.getElementById('event-save-btn').onclick = async function() {
    const name = document.getElementById('em-name').value.trim();
    const date = document.getElementById('em-date').value;
    if (!name || !date) { showToast('⚠️ Cím és dátum kötelező!'); return; }
    const docId = document.getElementById('edit-event-id').value;
    await fsSet('esemenyek', docId || null, {
      name, location: document.getElementById('em-location').value.trim(),
      date, description: document.getElementById('em-desc').value.trim(),
      website: document.getElementById('em-web').value.trim(), approved: true
    });
    showToast('✅ Akció mentve!'); closeEventModal(); loadEvents();
  };

  window.deleteEvent = async function(id) {
    if (!confirm('Törlöd?')) return;
    await fsDelete('esemenyek', id);
    showToast('🗑️ Törölve'); loadEvents();
  };

  // PENDING EVENTS
  let evtPendingData = [];
  async function loadEvtPending() {
    const data = await fsList('bekuldott_esemenyek');
    evtPendingData = (data.documents || []).map(fromFs).filter(d => !bool(d.approved));
    document.getElementById('stat-evt-pending').textContent = evtPendingData.length;
    renderEvtPending();
  }

  function renderEvtPending() {
    const el = document.getElementById('evt-pending-list');
    if (!evtPendingData.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📥</div><div>Nincs függőben.</div></div>';
      return;
    }
    el.innerHTML = evtPendingData.map(e => `
      <div class="item-card pending">
        <div class="item-card-name">${e.name || '–'}</div>
        <div class="item-card-meta">📅 ${e.date || '–'} | 📍 ${e.location || '–'}</div>
        ${e.description ? `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">${e.description}</div>` : ''}
        <div class="item-actions">
          <button class="btn btn-approve" onclick="approveEvt('${e._id}')">✅ Jóváhagyás</button>
          <button class="btn btn-delete" onclick="deleteEvtPending('${e._id}')">🗑️ Elutasítás</button>
        </div>
      </div>`).join('');
  }

  window.approveEvt = async function(id) {
    const e = evtPendingData.find(x => x._id === id);
    if (!e) return;
    const { _id, approved: _a, createdAt, ...rest } = e;
    await fsSet('esemenyek', null, { ...rest, approved: true });
    await fsDelete('bekuldott_esemenyek', id);
    showToast('✅ Akció jóváhagyva!'); loadEvtPending(); loadEvents();
  };

  window.deleteEvtPending = async function(id) {
    if (!confirm('Elutasítod?')) return;
    await fsDelete('bekuldott_esemenyek', id);
    showToast('🗑️ Törölve'); loadEvtPending();
  };

  // TABS
  document.querySelectorAll('.admin-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });
  });

  // TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
